- id: doc-0001
  text: 'We hear the radio messages every day about corona, but our neighbourhood has no cases. The numbers
    they announce on television are not the real numbers because we know everyone here and no one has
    died. Wearing mask all day gives us headaches and makes it hard to breathe properly.

