    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease:belief-that-disease-does-not-exist-or-is-not-real
