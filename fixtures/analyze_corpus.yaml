# | Pattern     | n  | Carrier leaf code(s)                                                | Expected detector behavior                                                                  |
# |-------------|----|---------------------------------------------------------------------|---------------------------------------------------------------------------------------------|
# | rumour      | 6  | questions-about-hand-washing-or-hand-sanitizers                     | a tight 2-day cluster of the same low-volume code, isolated in time                         |
