    codes: covid-19:encouragement-or-praise:statement-of-encouragement-to-continue-the-work:statement-of-encouragement-to-continue-the-work
- id: doc-0019
  text: 'The pandemic has created many problems for us. We cannot travel to sell our goods anymore. The
    price of rice has gone up so much that poor families cannot eat properly. This corona is destroying
    our livelihoods and making us poorer every day.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
