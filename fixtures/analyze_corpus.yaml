    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-schools-and-education:questions-about-return-to-schools
- id: doc-0014
  text: 'Stop bothering us with all these corona messages. We are tired of it. The pandemic is finished
    now and we just want to get back to normal life without hearing about the virus every single day.

