    source: community feedback session
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease:belief-that-disease-does-exist-or-is-real
- id: doc-0011
  text: 'We wash our hands regularly now because we understand the importance. The people in our compound
    have buckets for washing and we use soap every time we come from outside. We follow all the rules
    they teach us.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: door-to-door visit
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-on-general-situation-and-behaviours:observations-of-adherence-to-health-measures
- id: doc-0012
  text: 'The doctors and nurses who came to our community deserve our thanks. They work hard and put themselves
    at risk. We appreciate their sacrifice and their courage.

