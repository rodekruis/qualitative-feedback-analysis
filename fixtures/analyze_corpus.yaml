    codes: covid-19:question:questions-about-general-situation-and-behaviours:questions-about-why-we-don-t-see-sick-people
- id: doc-0045
  text: 'The virus spreads through the air when infected people breathe or cough near you. Everyone should
    keep distance and wear masks in crowded places. This is the main way the disease travels between people.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Western Area
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:belief-about-how-the-disease-spreads:beliefs-about-ways-of-transmission
- id: doc-0046
  text: 'Good work by the Red Cross volunteers. It is noble work that you are doing. May God bless you
    and keep you safe as you serve our communities with such dedication.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Encouragement or praise
    region: Northern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:encouragement-or-praise:statement-that-acknowledges-the-work:statement-that-acknowledges-the-work
- id: doc-0047
  text: 'Instead of just talking about corona, the government should actually help us with food and money.
    We have heard all the warnings but we need action and real support not just words and speeches.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-for-flexible-efficient-action:request-for-flexible-efficient-action
- id: doc-0048
  text: 'The vaccine was tested on us Africans without our knowledge. I do not trust a vaccine that has
    not gone through proper testing for many years. It could have hidden dangers.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Southern Province
    country: Sierra Leone
    language: en
    source: focus group
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-vaccines-or-immunizations:observations-or-beliefs-about-the-vaccine-origin-testing-or-government-approval
- id: doc-0049
  text: 'What should I do if I think I have corona? Who do I call and where do I go to get tested? I am
    worried and do not know the right steps to take.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Western Area
    country: Sierra Leone
    language: en
    source: hotline
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-what-to-do-if-you-suspect-someone-has-the-disease:questions-about-what-to-do-if-you-suspect-someone-has-the-disease
- id: doc-0050
  text: 'We are afraid that if corona comes to our area the health system will not be able to handle it.
    Our hospitals are already struggling with limited beds and medicines. What will happen to us if there
    is an outbreak?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:fear-or-stigma:other-fears
- id: doc-0051
  text: 'The masks cannot protect you if the virus is so small and dangerous. They are just for show.
    People wear them to create fear and make us feel like we are in danger always.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-behaviors-that-protect-people-or-prevention:beliefs-about-face-masks
- id: doc-0052
  text: 'I want to know how long someone has been sick before the symptoms show up. What is the waiting
    time from being infected to feeling ill? This will help me understand if I am at risk.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Southern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-the-disease:other-questions-about-the-disease
- id: doc-0053
  text: 'We need help to care for our brother who is sick at home. Please send someone to advise us on
    how to treat him safely and protect ourselves. He has fever and is coughing a lot.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Western Area
    country: Sierra Leone
    language: en
    source: hotline
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-for-quality-health-care-service-test-medicine-treatment:request-for-support-for-specific-case
- id: doc-0054
  text: 'The barrier measures are very important and we should not lift them yet. The government should
    continue to enforce hand washing at public places and social distancing to reduce transmission.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Northern Province
    country: Sierra Leone
    language: en
    source: focus group
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-for-responsive-government-action-against-the-disease:enforcement-and-encouragement-of-phm
- id: doc-0055
  text: 'People in my neighbourhood are wearing masks everywhere now. I see them at the market, in the
    church, and on the streets. Everyone is taking this seriously and trying to protect themselves and
    their families.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-on-general-situation-and-behaviours:observations-of-adherence-to-health-measures
- id: doc-0056
  text: 'How many doses of vaccine will we need to get full protection? Can we mix different vaccines
    if we cannot get the same one for both doses? I want to understand the vaccination schedule.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Southern Province
    country: Sierra Leone
    language: en
    source: hotline
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-vaccines-or-immunizations:questions-about-vaccination-schedule-and-use
- id: doc-0057
  text: 'The virus can survive on surfaces for several days if conditions are right. This is why we must
    clean our homes regularly and avoid touching our faces without washing our hands first.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Western Area
    country: Sierra Leone
    language: en
    source: door-to-door visit
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:belief-about-how-the-disease-spreads:beliefs-about-the-survival-of-virus-under-specific-circumstances
- id: doc-0058
  text: 'We have lost our jobs because of the lockdown and now we cannot feed our children. We need the
    government to provide urgent relief. Our families are suffering and hungry.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease-outbreak:belief-about-the-consequences-of-the-disease-outbreak
- id: doc-0059
  text: 'The volunteers have been trained well and they understand the disease. They take care to explain
    things clearly so that even children can understand the prevention measures.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 2
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-people-or-organizations-responding-to-the-disease:observation-or-belief-about-the-red-cross
- id: doc-0060
  text: 'Does anyone know if children can get corona or if they are naturally protected? I am worried
    about sending my children to school. Can they bring the virus home to their grandmother?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Southern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-disease-outbreak:questions-about-who-is-or-is-not-affected
- id: doc-0061
  text: 'We thank God for the Red Cross workers who have come to help us. Thank you for your service and
    your courage in the face of this disease. God will reward your dedication.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Encouragement or praise
    region: Western Area
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:encouragement-or-praise:statement-of-thanks-for-health-promotion:statement-of-thanks-for-health-promotion
- id: doc-0062
  text: 'The symptoms described for corona sound like many other common illnesses. Fever, cough, tiredness
    - these are symptoms of malaria and influenza too. How do we know which disease someone has without
    a test?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: focus group
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease:belief-about-the-symptoms-of-the-disease
- id: doc-0063
  text: 'We should be teaching people in schools and churches about how the disease spreads and how to
    protect themselves. Let us use local leaders and respected community members to help spread the message.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:suggestions-about-preparedness-or-response-activities-pertaining-to-the-disease:request-for-community-health-promotion-about-the-disease
- id: doc-0064
  text: 'We have not seen any dead bodies from corona even though the radio says many people have died.
    Where are the dead? If so many were dying we would see evidence in our own eyes.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Southern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-on-general-situation-and-behaviours:statement-not-to-have-seen-any-dead-or-sick-people
- id: doc-0065
  text: 'Why are there no hand washing stations in the market where many people gather? It is difficult
    for traders to follow prevention rules when there are no facilities. The government must provide these
    basic supplies.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Western Area
    country: Sierra Leone
    language: en
    source: hotline
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-preparedness-or-response-activities-pertaining-to-the-disease:questions-about-provision-of-hand-washing-utensils-or-hand-sanitizers
- id: doc-0066
  text: 'The government must take immediate action to end this pandemic. We cannot wait any longer. Our
    people are dying and more must be done to fight this disease and save lives.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Northern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-to-stop-the-disease-outbreak:request-to-stop-the-disease-outbreak
- id: doc-0067
  text: 'We need hospitals to be properly equipped with necessary tools and medicines to care for corona
    patients. Build more treatment centres and train more healthcare workers immediately.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: focus group
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-for-quality-health-care-service-test-medicine-treatment:request-to-improve-health-care
- id: doc-0068
  text: 'If the coronavirus arrived during the wet season it would not spread as much. The rain would
    wash the virus away. That is why we see fewer cases in some places.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Southern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:belief-about-how-the-disease-spreads:beliefs-about-the-survival-of-virus-under-specific-circumstances
- id: doc-0069
  text: 'When will the pandemic end? How long must we live like this? We are tired of restrictions and
    want to know when we can go back to normal life.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Western Area
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-disease-outbreak:questions-about-how-long-the-disease-outbreak-may-last
- id: doc-0070
  text: 'I trust the health workers and the Red Cross to give me good information about corona. They have
    shown me that they care about our wellbeing and want to keep us safe. I will follow their advice.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-people-or-organizations-responding-to-the-disease:observation-or-belief-about-the-red-cross
- id: doc-0071
  text: 'The pandemic is over now. The government has said so and people are returning to their normal
    activities. Why are we still being asked to follow prevention measures when the disease has ended?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease-outbreak:belief-that-the-outbreak-has-ended
- id: doc-0072
  text: 'What is happening at the testing sites? Are they actually testing people for corona or are they
    just taking blood samples for other reasons? People are suspicious and afraid to go for tests.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Southern Province
    country: Sierra Leone
    language: en
    source: hotline
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-health-care-services-for-the-disease:questions-about-testing
- id: doc-0073
  text: 'We must install more water points and provide soap and sanitizers in all public areas. Without
    these basic facilities people cannot follow prevention measures. The government should act now.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Western Area
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:suggestions-about-preparedness-or-response-activities-pertaining-to-the-disease:request-for-distribution-of-hand-washing-utensils-or-hand-sanitizers
- id: doc-0074
  text: 'If you pray regularly and have strong faith you will not get sick. God protects the righteous.
    Corona only affects people who do not believe and those who live in sin.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-behaviors-that-protect-people-or-prevention:beliefs-about-prayer
- id: doc-0075
  text: 'I appreciate the volunteers for their hard work. Courage and good work to you all. Thank you
    for risking your safety to help our community during this difficult time.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Encouragement or praise
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: door-to-door visit
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:encouragement-or-praise:statement-of-thanks:statement-of-thanks
- id: doc-0076
  text: 'How do we know the vaccine is safe when it was developed so quickly? What happens if there are
    hidden side effects that only show up after many years? I am worried about the long-term effects.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Southern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-vaccines-or-immunizations:questions-about-vaccine-safety
- id: doc-0077
  text: 'We have contacted the authorities many times about distributing protective equipment but nothing
    happens. We are asking for masks and hand sanitizers to be shared with poor families who cannot buy
    them.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Western Area
    country: Sierra Leone
    language: en
    source: focus group
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-preparedness-or-response-activities-pertaining-to-the-disease:observations-or-beliefs-about-other-preparedness-or-response-activities
- id: doc-0078
  text: 'Can you get corona through sex? Some people are saying this is how the virus spreads most easily.
    Is this information correct or just a rumour?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Northern Province
    country: Sierra Leone
    language: en
    source: hotline
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-how-the-disease-spreads:sexual-transmission
- id: doc-0079
  text: 'The rice distributed by the government has been poisoned with the corona virus. This is why people
    are falling sick. We should reject these distributions and grow our own food instead.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:statements-indicating-mistrust-in-the-response:belief-that-people-are-spreading-the-disease
- id: doc-0080
  text: 'The closure of churches has hurt our spiritual life. We need government to allow places of worship
    to open so we can gather and pray together. This is essential for our mental health.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Southern Province
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:suggestions-linked-to-lockdown-restriction-of-movement-and-closing-borders:suggestions-to-lift-lockdown-or-open-certain-places
- id: doc-0081
  text: 'Eating plenty of oranges and vitamin C rich foods can help prevent corona. This strengthens your
    immune system. Many people in my community have started eating more of these fruits.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Western Area
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-behaviors-that-protect-people-or-prevention:beliefs-about-other-behaviors-that-can-protect-people-from-the-disease
- id: doc-0082
  text: 'The contact tracing teams are doing good work. They identify people who have been exposed and
    help them get tested and treated. This is an important part of stopping the spread.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-preparedness-or-response-activities-pertaining-to-the-disease:observation-or-belief-about-contact-tracing
- id: doc-0083
  text: 'What are the side effects of the coronavirus vaccine? Some people say it causes paralysis and
    makes women infertile. Is this true or just propaganda?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: hotline
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-vaccines-or-immunizations:questions-about-vaccine-safety
- id: doc-0084
  text: 'The pandemic has changed how we live. We have learned to stay home more and appreciate our families.
    Some positive things have come from this difficult time. We are stronger now.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Southern Province
    country: Sierra Leone
    language: en
    source: focus group
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease-outbreak:belief-about-the-nature-and-evolution-of-the-disease-outbreak
- id: doc-0085
  text: 'The government should train police and community leaders in proper enforcement of health measures.
    We need consistent and fair implementation of the rules across all areas.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Request or suggestion
    region: Western Area
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:request-or-suggestion:request-to-train-or-involve-certain-people-or-institutions:request-to-train-or-involve-certain-people-or-institutions
- id: doc-0086
  text: 'If there is a rumour of a British variant coming to Sierra Leone we should strengthen our borders
    immediately. The government must prevent this new strain from entering our country.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: WhatsApp message
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease:observations-or-beliefs-about-new-variants-or-mutations
- id: doc-0087
  text: 'Will the vaccine be available to everyone or just to those with money? We need a fair distribution
    system that prioritizes healthcare workers and vulnerable populations. Please be transparent about
    this.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Eastern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-vaccines-or-immunizations:questions-about-vaccine-access-and-priority-groups
- id: doc-0088
  text: 'The volunteers who visit are very rude and they do not respect us. They speak down to us as if
    we are stupid. This makes people angry and less willing to listen to their messages about prevention.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Sensitive or violent comment
    region: Southern Province
    country: Sierra Leone
    language: en
    source: hotline
    year: 2020
    sentence_count: 3
    sensitive: true
    codes: covid-19:sensitive-or-violent-comment:statement-that-is-a-complaint-about-a-specific-responder:statement-that-is-a-complaint-about-a-specific-responder
- id: doc-0089
  text: 'If corona comes back to our area we will gather and burn down the government offices. We are
    tired of all the restrictions and broken promises. Enough is enough.

    '
  metadata:
    dataset: COVID-19
    feedback_type: Sensitive or violent comment
    region: Western Area
    country: Sierra Leone
    language: en
    source: radio call-in
    year: 2021
    sentence_count: 3
    sensitive: true
    codes: covid-19:sensitive-or-violent-comment:other-sensitive-or-violent-statement:other-sensitive-or-violent-statement
- id: doc-0090
  text: 'How long will the virus survive on my clothes if someone sick touches them? Should I wash all
    my clothes every day? What precautions should I take with my laundry?

    '
  metadata:
    dataset: COVID-19
    feedback_type: Question
    region: Northern Province
    country: Sierra Leone
    language: en
