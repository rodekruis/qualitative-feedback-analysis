    codes: covid-19:observation-perception-or-belief:observations-or-beliefs-about-government-not-responding-or-responding-well:observations-or-beliefs-about-government-not-responding-or-responding-well
- id: doc-0037
  text: 'The government should provide free medicines to everyone. Corona treatment should not be a luxury
    that only rich people can afford. We are calling for affordable healthcare for all.

    '
