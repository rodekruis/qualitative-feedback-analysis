# | spike       | 48 | observations-or-beliefs-about-other-health-care-services            | per-code monthly bucket count should spike around month 6 (peak ~8x baseline)               |
# | step        | 48 | observations-or-beliefs-about-new-variants-or-mutations             | per-code monthly count jumps ~5x at month index 8                                           |
# | emerging    | 48 | questions-about-the-vaccine-origin-testing-or-government-approval   | per-code monthly count rises ~6x from start to end                                          |
# | declining   | 48 | other-observations-or-beliefs-about-schools-and-education           | per-code monthly count falls to ~0.17x of start                                             |
# | baseline    | 4667 | (all other codes, uniformly random dates)                          | flat-ish; the noise floor                                                                |
