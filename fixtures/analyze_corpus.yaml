    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-behaviors-that-protect-people-or-prevention:beliefs-about-face-masks
- id: doc-0002
  text: 'In our community, God protects us from this disease. Our faith is stronger than any virus. We
    pray every morning and evening and believe the Almighty will keep us safe.

