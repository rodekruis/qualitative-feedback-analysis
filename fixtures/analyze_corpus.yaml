    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:statements-indicating-mistrust-in-the-response:belief-that-people-are-spreading-the-disease
- id: doc-0036
  text: 'The government is not doing enough to fight this disease. They have the money and the resources
    but they are not using them. We need stronger action from our leaders right now.

    '
