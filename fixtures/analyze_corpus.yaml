    language: en
    source: focus group
    year: 2020
    sentence_count: 3
    sensitive: false
    codes: covid-19:encouragement-or-praise:statement-of-thanks:statement-of-thanks
- id: doc-0013
  text: 'Why are they closing the schools? Our children need education. How will they learn at home when
    many families don''t have books or proper space? When will schools reopen safely?

