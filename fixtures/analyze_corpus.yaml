    source: door-to-door visit
    year: 2020
    sentence_count: 4
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-the-disease-outbreak:belief-about-the-consequences-of-the-disease-outbreak
- id: doc-0020
  text: 'Are there enough testing centers in all the districts? Many people want to be tested but they
    do not know where to go or if they have to pay money. Can we get free testing for everyone?

