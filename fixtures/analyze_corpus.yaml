    sentence_count: 3
    sensitive: false
    codes: covid-19:observation-perception-or-belief:beliefs-about-behaviors-that-protect-people-or-prevention:beliefs-about-prayer
- id: doc-0003
  text: 'People are not washing their hands like they should. You go to the market and see everyone touching
    things without care. The leaders themselves do not follow the prevention rules. How can we expect
    the community to be safe when those in charge do not set the example?

    '
