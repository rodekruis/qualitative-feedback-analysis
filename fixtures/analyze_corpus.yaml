    year: 2021
    sentence_count: 3
    sensitive: false
    codes: covid-19:question:questions-about-health-care-services-for-the-disease:questions-about-testing
- id: doc-0021
  text: 'The sun is very hot here and I believe the virus cannot survive in this heat. Corona was made
    for cold countries. Africa is too warm for this disease to kill people like it does in Europe.

