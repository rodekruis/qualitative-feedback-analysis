    feedback_type: Observation, perception or belief
    region: Northern Province
    country: Sierra Leone
    language: en
    source: community feedback session
    year: 2021
    sentence_count: 4
    sensitive: false
    codes: covid-19:observation-perception-or-belief:observations-on-general-situation-and-behaviours:observations-of-non-compliance-with-health-measures
- id: doc-0004
  text: 'The Red Cross team has been working hard in our area. They come door to door explaining how the
    virus spreads and what we should do. We are grateful for their efforts.

