# Terraform plan/apply workflow.
#
# Triggers:
#   - Automatically runs `plan` on any PR that touches infra/
#   - Can also be triggered manually via the Actions tab
#
# On pull requests the workflow *always* starts, and a `changes` job detects
# whether infra/ was touched. The real `terraform` job then runs only when it
# was, and is otherwise skipped. This is deliberate: the `terraform` check can
# be marked as a required status check in the branch ruleset without blocking
# PRs that don't touch infra/ — a required check that never reports (which is
# what a trigger-level `paths` filter produces) would leave those PRs stuck
# "waiting", whereas a skipped check is treated as passing.
#
# Usage (manual):
#   1. Select environment (dev or prd)
#   2. Select command (plan or apply)
#   3. Run from the Actions tab
name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (Terraform workspace)"
        type: choice
        options:
          - dev
          - staging
          - prd
        default: dev
      command:
        description: "Terraform command to run"
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: read
  id-token: write

jobs:
  # Detect whether this PR touches infra/. Runs only on pull_request; on
  # push/workflow_dispatch it is skipped and the terraform job falls back to
  # its original always-run behaviour. On pull_request events dorny/paths-filter
  # reads the changed-file list from the GitHub API, so no checkout is needed.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'

  terraform:
    needs: changes
    # Run for push/workflow_dispatch as before; on pull_request only when
    # infra/ changed. always() lets this evaluate even though `changes` is
    # skipped on non-PR events (a skipped need would otherwise skip this job).
    if: >-
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.infra == 'true')
    environment: ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZ_CLIENT_ID }}
          tenant-id: ${{ vars.AZ_TENANT_ID }}
          subscription-id: ${{ vars.AZ_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.AZ_TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.AZ_TF_STATE_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true

      - name: Select workspace
        run: terraform workspace select ${{ inputs.environment || 'dev' }}
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true

      - name: Terraform plan
        if: ${{ inputs.command != 'apply' }}
        run: terraform plan -input=false
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
          TF_VAR_subscription_id: ${{ vars.AZ_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ vars.AZ_TENANT_ID }}
          TF_VAR_resource_group_name: ${{ vars.AZ_RESOURCE_GROUP }}
          TF_VAR_acr_name: ${{ vars.AZ_ACR_NAME }}
          TF_VAR_acr_resource_group_name: ${{ vars.AZ_ACR_RESOURCE_GROUP }}
          TF_VAR_tf_state_storage_account: ${{ vars.AZ_TF_STATE_STORAGE_ACCOUNT }}
          TF_VAR_tf_state_resource_group_name: ${{ vars.AZ_TF_STATE_RESOURCE_GROUP }}
          TF_VAR_teams_webhook_url: ${{ secrets.TEAMS_ALERTS_WEBHOOK_URL }}

      - name: Terraform apply
        if: inputs.command == 'apply'
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
          TF_VAR_subscription_id: ${{ vars.AZ_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ vars.AZ_TENANT_ID }}
          TF_VAR_resource_group_name: ${{ vars.AZ_RESOURCE_GROUP }}
          TF_VAR_acr_name: ${{ vars.AZ_ACR_NAME }}
          TF_VAR_acr_resource_group_name: ${{ vars.AZ_ACR_RESOURCE_GROUP }}
          TF_VAR_tf_state_storage_account: ${{ vars.AZ_TF_STATE_STORAGE_ACCOUNT }}
          TF_VAR_tf_state_resource_group_name: ${{ vars.AZ_TF_STATE_RESOURCE_GROUP }}
          TF_VAR_teams_webhook_url: ${{ secrets.TEAMS_ALERTS_WEBHOOK_URL }}
