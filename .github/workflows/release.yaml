# Step 1 of the deploy pipeline. Run this manually from the Actions tab.
#
# What it does:
#   1. Runs the CI checks (lint + tests).
#   2. Bumps the version based on conventional commits.
#   3. Creates a **draft** GitHub Release.
#
# After it runs, review the draft release on the Releases page and click
# "Publish" when ready — that triggers the deploy (see publish.yaml).
name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force bump level (leave empty for auto)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
      prerelease:
        description: "Create a pre-release (e.g., 1.0.0-rc.1)"
        required: false
        type: boolean
        default: false
      prerelease_token:
        description: "Pre-release identifier (e.g., rc, beta, alpha)"
        required: false
        type: string
        default: "rc"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: ci
    runs-on: ubuntu-latest
    concurrency: { group: release, cancel-in-progress: false }
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Semantic Release (version only)
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: ${{ github.event.inputs.force }}
          prerelease: ${{ github.event.inputs.prerelease }}
          prerelease_token: ${{ github.event.inputs.prerelease_token }}
          changelog: false
          vcs_release: false

      - name: Generate release notes
        if: steps.semrel.outputs.released == 'true'
        run: |
          pipx install python-semantic-release
          semantic-release changelog
          # Extract only the latest version's section from CHANGELOG.md
          awk '/^## v/{if(found) exit; found=1} found' CHANGELOG.md > release_notes.md

      - name: Create draft GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.semrel.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.semrel.outputs.tag }}" \
            --draft \
            --notes-file release_notes.md \
            --title "${{ steps.semrel.outputs.tag }}" \
            $PRERELEASE_FLAG
