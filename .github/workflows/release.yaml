# Step 1 of the release pipeline. Run this manually from the Actions tab.
#
# What it does, in order:
#   1. Runs CI (lint + tests).
#   2. Bumps the version based on conventional commits.
#   3. Builds a Docker image for the new version, pushes it to ACR,
#      and reads back the registry-assigned digest.
#   4. Creates a *draft* GitHub Release with the digest embedded in the body.
#   5. Auto-deploys the digest to dev via the reusable _deploy-release.yaml.
#
# After it runs: the release exists as a draft, dev is running the new
# image, and you can validate. Once you're happy:
#   - Click "Publish" on the draft release (Releases page). That flips
#     draft → published and makes the release eligible for promotion.
#   - Run Promote to staging / Promote to prd from the Actions tab to
#     deploy the exact same digest to those environments.
#
# The draft → published transition is the human sign-off gate. A release
# cannot reach staging or prd until a human has validated it in dev and
# published it. promote-to-staging and promote-to-prd refuse drafts.
name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force bump level (leave empty for auto)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
      prerelease:
        description: "Create a pre-release (e.g., 1.0.0-rc.1)"
        required: false
        type: boolean
        default: false
      prerelease_token:
        description: "Pre-release identifier (e.g., rc, beta, alpha)"
        required: false
        type: string
        default: "rc"

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: ci
    runs-on: ubuntu-latest
    # Use the dev environment to pick up Azure OIDC credentials and the ACR
    # name. This job does not *deploy* to dev — it only builds, pushes, and
    # creates the draft. Deployment is delegated to the deploy-to-dev job.
    environment: dev
    concurrency: { group: release, cancel-in-progress: false }
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      tag: ${{ steps.semrel.outputs.tag }}
      is_prerelease: ${{ steps.semrel.outputs.is_prerelease }}
    steps:
      # Requires org/repo admin setup: create RELEASE_APP_CLIENT_ID,
      # create RELEASE_APP_PRIVATE_KEY, install the GitHub App on this repo,
      # and allow the app to bypass the main branch ruleset.
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Semantic Release (version only)
        id: semrel
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          force: ${{ github.event.inputs.force }}
          prerelease: ${{ github.event.inputs.prerelease }}
          prerelease_token: ${{ github.event.inputs.prerelease_token }}
          changelog: false
          vcs_release: false

      - name: No release needed
        if: steps.semrel.outputs.released != 'true'
        run: |
          echo "::notice::No release — no conventional commits since last tag, or the forced bump level produced no change."

      - name: Generate release notes
        if: steps.semrel.outputs.released == 'true'
        run: |
          pipx install python-semantic-release
          semantic-release changelog
          # Extract only the latest version's section from CHANGELOG.md
          awk '/^## v/{if(found) exit; found=1} found' CHANGELOG.md > release_notes.md

      - name: Login to Azure
        if: steps.semrel.outputs.released == 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZ_CLIENT_ID }}
          tenant-id: ${{ vars.AZ_TENANT_ID }}
          subscription-id: ${{ vars.AZ_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: steps.semrel.outputs.released == 'true'
        run: az acr login --name "${{ vars.AZ_ACR_NAME }}"

      - name: Build and push image
        id: push
        if: steps.semrel.outputs.released == 'true'
        env:
          IMAGE: ${{ vars.AZ_ACR_NAME }}.azurecr.io/qfa-backend
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          set -euo pipefail
          docker build -t "$IMAGE:$TAG" .
          docker push "$IMAGE:$TAG"
          # Read the digest back from ACR — it is the authoritative value.
          DIGEST=$(az acr repository show \
            --name "${{ vars.AZ_ACR_NAME }}" \
            --image "qfa-backend:$TAG" \
            --query 'digest' -o tsv)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE:$TAG -> $DIGEST"

      - name: Append deployment section to release notes
        if: steps.semrel.outputs.released == 'true'
        env:
          IMAGE: ${{ steps.push.outputs.image }}
          DIGEST: ${{ steps.push.outputs.digest }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          cat >> release_notes.md <<EOF

          ---

          ## Deployment

          - **Image**: \`${IMAGE}:${TAG}\`
          - **Digest**: \`${DIGEST}\`

          This draft release has been auto-deployed to dev. Review in dev,
          then publish the release (Releases page → Publish) to enable
          promotion to staging / prd.
          EOF

      - name: Create draft GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.semrel.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.semrel.outputs.tag }}" \
            --draft \
            --notes-file release_notes.md \
            --title "${{ steps.semrel.outputs.tag }}" \
            $PRERELEASE_FLAG

  deploy-to-dev:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/_deploy-release.yaml
    with:
      release_tag: ${{ needs.release.outputs.tag }}
      environment: dev
    permissions:
      contents: write
      id-token: write
