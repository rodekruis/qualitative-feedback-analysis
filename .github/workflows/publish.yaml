# Step 2 of the deploy pipeline. Runs automatically when you publish a
# GitHub Release (i.e. when a draft created by release.yaml is published).
#
# What it does:
#   1. Builds a Docker image and pushes it to ACR.
#   2. Pushes app settings (from GitHub Secrets) to Azure.
#   3. Deploys the container to Azure App Service.
#
# Can also be triggered manually via the Actions tab (workflow_dispatch).
name: Deploy to Azure

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - production
        default: dev
      ref:
        description: "Git ref to deploy (tag, branch, or SHA). Defaults to the default branch."
        required: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.AZ_ACR_NAME }}.azurecr.io/qfa-backend

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || '' }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZ_CLIENT_ID }}
          tenant-id: ${{ vars.AZ_TENANT_ID }}
          subscription-id: ${{ vars.AZ_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ vars.AZ_ACR_NAME }}"

      - name: Build and push image
        run: |
          TAG=${{ github.event.release.tag_name || github.sha }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --name "${{ vars.AZ_APP_NAME }}" \
            --resource-group "${{ vars.AZ_RESOURCE_GROUP }}" \
            --settings \
              LLM_PROVIDER="${{ vars.LLM_PROVIDER }}" \
              LLM_MODEL="${{ vars.LLM_MODEL }}" \
              LLM_API_VERSION="${{ vars.LLM_API_VERSION }}" \
              LLM_AZURE_ENDPOINT="@Microsoft.KeyVault(SecretUri=https://${{ vars.AZ_KEYVAULT}}.vault.azure.net/secrets/llm-azure-endpoint)" \
              LLM_API_KEY="@Microsoft.KeyVault(SecretUri=https://${{ vars.AZ_KEYVAULT}}.vault.azure.net/secrets/llm-api-key)" \
              AUTH_API_KEYS="@Microsoft.KeyVault(SecretUri=https://${{ vars.AZ_KEYVAULT}}.vault.azure.net/secrets/auth-api-keys)"

      - name: Deploy container
        run: |
          az webapp config container set \
            --name "${{ vars.AZ_APP_NAME }}" \
            --resource-group "${{ vars.AZ_RESOURCE_GROUP }}" \
            --container-image-name "$IMAGE:$TAG" \
            --container-registry-url "https://${{ vars.AZ_ACR_NAME }}.azurecr.io"
